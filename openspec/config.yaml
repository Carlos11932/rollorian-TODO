schema: spec-driven

context: |
  Tech stack: Next.js 16 App Router, React 19, TypeScript 5, Prisma 7, Zod 4, Tailwind CSS 4.
  Architecture: Server-first App Router with domain/application/interfaces/features/lib boundaries and route handlers under src/app/api.
  Persistence: Prisma configured for PostgreSQL, with in-memory runtime/repository adapters still backing current execution paths.
  Testing: Vitest for unit/integration, Playwright script available for E2E, V8 coverage via vitest run --coverage.
  Style: ESLint 9 (Next core-web-vitals + TS), strict TypeScript via tsc --noEmit, no dedicated formatter detected.
  Conventions: No project-level agent instruction files detected; skill registry stored in .atl/skill-registry.md.

strict_tdd: false

testing:
  detected: 2026-04-15
  strict_tdd: false
  note: "Strict TDD Mode remains disabled because existing openspec/config.yaml already set strict_tdd: false, which takes precedence over auto-enabling from detected test infrastructure."
  test_runner:
    available: true
    framework: "Vitest 4"
    command: "npm run test:run"
  layers:
    unit:
      available: true
      tool: "Vitest"
    integration:
      available: true
      tool: "Vitest + Testing Library"
    e2e:
      available: true
      tool: "Playwright"
  coverage:
    available: true
    command: "npm run test:coverage"
  quality_tools:
    linter:
      available: true
      command: "npm run lint"
    type_checker:
      available: true
      command: "npm run typecheck"
    formatter:
      available: false
      command: "—"

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
    - Client components and browser-facing helpers MUST import only client-safe leaf modules and MUST NOT import mixed barrels that re-export server-only modules
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
    - For client-surface TypeScript changes, run `npm run typecheck` and `npm run lint:strict` before PR and verify client files do not import server-only or mixed server barrels
  archive:
    - Warn before merging destructive deltas (large removals)
